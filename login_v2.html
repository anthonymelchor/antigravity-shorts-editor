<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RocotoClip - Login &amp; Signup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .brushed-metal {
            background-color: #101f22;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(13, 204, 242, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(255, 0, 255, 0.1) 0%, transparent 35%),
                repeating-linear-gradient(45deg, rgba(255,255,255, 0.01) 0px, rgba(255,255,255, 0.01) 1px, transparent 1px, transparent 10px);
        }
        .glass-panel {
            background: rgba(16, 31, 34, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(13, 204, 242, 0.2);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen selection:bg-primary/30">
<div class="relative min-h-screen w-full flex flex-col items-center justify-center brushed-metal overflow-hidden">
<!-- Navigation -->
<nav class="absolute top-0 w-full flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-xl font-bold tracking-tight">RocotoClip</h2>
</div>
<div class="hidden md:flex gap-8 items-center">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Features</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Pricing</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Showcase</a>
</div>
</nav>
<!-- Main Form Container -->
<main class="w-full max-w-[480px] px-6 relative z-10">
<div class="glass-panel rounded-xl p-8 shadow-2xl">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold mb-2 tracking-tight">Welcome Back</h1>
<p class="text-slate-400 text-sm">Access your Cyber-Professional workspace</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
<div class="relative group">
<input class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg px-4 py-3.5 text-slate-100 placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold uppercase tracking-widest text-slate-400">Password</label>
<a class="text-xs text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<input class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg px-4 py-3.5 text-slate-100 placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none pr-12" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-slate-500 cursor-pointer hover:text-primary transition-colors">visibility</span>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-background-dark font-bold py-4 rounded-lg shadow-[0_0_20px_rgba(13,204,242,0.3)] hover:shadow-[0_0_30px_rgba(13,204,242,0.5)] transition-all flex items-center justify-center gap-2 group">
                        Get Started
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700/50"></div></div>
<div class="relative flex justify-center text-xs uppercase tracking-widest"><span class="bg-transparent px-4 text-slate-500">Or continue with</span></div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 bg-white/5 border border-white/10 py-3 rounded-lg hover:bg-white/10 transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-M0FwJHpzJIMZQxU2JJXfo6Uw70HEHduCcgXWJ5ebPxviyBD8369n0MEGoDoJEmCtyA9_yCim-2qWGJpS_ieKbASLgkZz2GSinqmHpua6hQi7pMhkZ7oz1ceb3ty4V3r0uD7H9VcvctTXJNLhKPflaxTkVpQKB_m58ZPgNjQ5YKb_qrA_yW29zJV9DFISBbJYnsARJtOUP9jMW31JHj1uJyO8-PQzpx0pSy9NRiBElZFq8qQ_-ZbJ7mvQe6Yye5jtBU5FSR0LjrAb"/>
<span class="text-sm font-medium">Google Account</span>
</button>
<p class="text-center mt-8 text-sm text-slate-400">
                    Don't have an account? <a class="text-primary font-semibold hover:underline" href="#">Sign up for free</a>
</p>
</div>
<!-- AI Badge -->
<div class="mt-8 flex justify-center">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-primary/10 border border-primary/20 rounded-full">
<span class="flex h-2 w-2 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-primary">AI-Powered Discovery Engine Active</span>
</div>
</div>
</main>
<!-- Background Elements -->
<div class="absolute bottom-10 left-10 opacity-20 hidden lg:block">
<div class="flex items-center gap-4">
<div class="w-32 h-[1px] bg-primary"></div>
<span class="text-[10px] uppercase tracking-widest text-primary">Protocol v2.04</span>
</div>
</div>
<div class="absolute top-1/2 left-0 -translate-y-1/2 p-12 opacity-5 hidden xl:block">
<span class="text-[12rem] font-black leading-none select-none">ROCOTO</span>
</div>
<div class="absolute bottom-0 right-0 p-8 flex gap-4 text-slate-600 text-[10px] uppercase tracking-[0.3em]">
<a class="hover:text-primary" href="#">Privacy Policy</a>
<span>/</span>
<a class="hover:text-primary" href="#">Terms of Service</a>
</div>
</div>
</body></html>
